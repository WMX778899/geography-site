<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 高中地理知识整合</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="/geography-site/css/style.css">
</head>
<body class="page--auth page--login">
    <header class="header">
        <div class="header-inner">
            <a href="/geography-site/index.html" class="logo">
                <span class="logo-icon">🌍</span>
                <span class="logo-text">高中地理知识整合</span>
            </a>
            <nav class="nav" id="mainNav">
                <a href="/geography-site/index.html" class="nav-link">首页</a>
                <a href="/geography-site/knowledge/nature.html" class="nav-link">自然地理</a>
                <a href="/geography-site/knowledge/humanity.html" class="nav-link">人文地理</a>
                <a href="/geography-site/knowledge/region.html" class="nav-link">区域地理</a>
                <a href="/geography-site/knowledge/elective.html" class="nav-link">选修专题</a>
                <a href="/geography-site/knowledge/inquiry.html" class="nav-link">综合探究</a>
                <a href="/geography-site/maps.html" class="nav-link">🗺️地图</a>
                <a href="/geography-site/login.html" class="nav-link active">登录</a>
                <a href="/geography-site/register.html" class="nav-link">注册</a>
                <a href="https://www.dili360.com" target="_blank" class="nav-link nav-link--external">
                    📰 中国国家地理
                </a>
            </nav>
            <button class="nav-toggle" id="navToggle" aria-label="菜单"><span></span><span></span><span></span></button>
        </div>
    </header>

    <main class="main auth-layout">
        <section class="auth-panel" aria-labelledby="loginTitle">
            <div class="auth-panel__intro">
                <span class="auth-panel__icon">📚</span>
                <div>
                    <h1 id="loginTitle">邮箱登录</h1>
                    <p>使用邮箱和密码登录/p>
                </div>
            </div>

            <form class="auth-form" id="loginForm" novalidate>
                <label class="auth-field">
                    <span>邮箱</span>
                    <input type="email" name="email" autocomplete="username" placeholder="请输入注册邮箱 required>
                </label>

                <label class="auth-field">
                    <span>密码</span>
                    <input type="password" name="password" autocomplete="current-password" placeholder="请输入密码 required onpaste="return false">
                </label>

                <label class="auth-field">
                    <span>邮箱验证码/span>
                    <div class="auth-code-row">
                        <input type="text" name="emailCode" inputmode="numeric" placeholder="6 位验证码" required>
                        <button type="button" class="btn btn--outline auth-send-code" id="sendEmailCode">获取验证码/button>
                    </div>
                    <small class="auth-code-hint" id="emailCodeHint"></small>
                </label>

                <div class="auth-message" id="loginMessage" aria-live="polite"></div>

                <button type="submit" class="btn btn--primary auth-submit">登录</button>
                <p class="auth-switch">还没有账号？<a href="/geography-site/register.html">去注册/a></p>

                <div class="auth-demo-hint">
                    <span class="auth-demo-hint__icon">🔑</span>
                    <div>
                        <strong>演示账号</strong><br>
                        邮箱：code>admin@geo.com</code> &nbsp; 密码code>demo1234</code>
                    </div>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>高中地理知识整合平台 &copy; 2026</p>
            <p class="footer-links">
                <a href="https://www.dili360.com" target="_blank">中国国家地理</a> |
                <a href="https://www.nmg.com.cn" target="_blank">内蒙古自然地理/a> |
                <a href="https://www.cgnpc.org.cn" target="_blank">中国地理学会</a>
            </p>
        </div>
    </footer>

    <script src="/geography-site/js/data.js"></script>
    <script src="/geography-site/js/app.js"></script>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
