<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 高中地理知识整合</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="/geography-site/css/style.css">
</head>
<body class="page--auth page--register">
    <header class="header">
        <div class="header-inner">
            <a href="/geography-site/index.html" class="logo">
                <span class="logo-icon">🌍</span>
                <span class="logo-text">高中地理知识整合</span>
            </a>
            <nav class="nav" id="mainNav">
                <a href="/geography-site/index.html" class="nav-link">首页</a>
                <a href="/geography-site/knowledge/nature.html" class="nav-link">自然地理</a>
                <a href="/geography-site/knowledge/humanity.html" class="nav-link">人文地理</a>
                <a href="/geography-site/knowledge/region.html" class="nav-link">区域地理</a>
                <a href="/geography-site/knowledge/elective.html" class="nav-link">选修专题</a>
                <a href="/geography-site/knowledge/inquiry.html" class="nav-link">综合探究</a>
                <a href="/geography-site/maps.html" class="nav-link">🗺️地图</a>
                <a href="/geography-site/login.html" class="nav-link">登录</a>
                <a href="/geography-site/register.html" class="nav-link active">注册</a>
                <a href="https://www.dili360.com" target="_blank" class="nav-link nav-link--external">
                    📰 中国国家地理
                </a>
            </nav>
            <button class="nav-toggle" id="navToggle" aria-label="菜单"><span></span><span></span><span></span></button>
        </div>
    </header>

    <main class="main auth-layout">
        <section class="auth-panel" aria-labelledby="registerTitle">
            <div class="auth-panel__intro">
                <span class="auth-panel__icon">🧭</span>
                <div>
                    <h1 id="registerTitle">创建学习账号</h1>
                    <p>填写信息完成注册/p>
                </div>
            </div>

            <form class="auth-form" id="registerForm" novalidate>
                <label class="auth-field">
                    <span>名称</span>
                    <input type="text" name="name" autocomplete="name" placeholder="请输入名称 required>
                </label>

                <label class="auth-field">
                    <span>邮箱</span>
                    <div class="auth-email-group">
                        <input type="text" name="emailName" autocomplete="username" placeholder="邮箱前缀" required>
                        <select name="emailDomain" aria-label="邮箱后缀">
                            <option value="@qq.com">@qq.com</option>
                            <option value="@163.com">@163.com</option>
                            <option value="@126.com">@126.com</option>
                            <option value="@gmail.com">@gmail.com</option>
                            <option value="@outlook.com">@outlook.com</option>
                            <option value="@hotmail.com">@hotmail.com</option>
                            <option value="@icloud.com">@icloud.com</option>
                        </select>
                    </div>
                </label>

                <label class="auth-field">
                    <span>密码</span>
                    <input type="password" name="password" autocomplete="new-password" placeholder="至少 8 位，含字母和数字" required onpaste="return false">
                </label>

                <label class="auth-field">
                    <span>确认密码</span>
                    <input type="password" name="confirmPassword" autocomplete="new-password" placeholder="再次输入密码" required onpaste="return false">
                </label>

                <label class="auth-field">
                    <span>随机验证码/span>
                    <div class="auth-code-row">
                        <input type="text" name="captcha" placeholder="输入右侧验证码 required>
                        <button type="button" class="auth-code" id="refreshCaptcha" aria-label="刷新验证码>
                            <span id="registerCaptcha"></span>
                        </button>
                    </div>
                    <small>验证码不区分字母大小写/small>
                </label>

                <div class="auth-message" id="registerMessage" aria-live="polite"></div>

                <button type="submit" class="btn btn--primary auth-submit">注册</button>
                <p class="auth-switch">已有账号？a href="/geography-site/login.html">去登录/a></p>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <p>高中地理知识整合平台 &copy; 2026</p>
            <p class="footer-links">
                <a href="https://www.dili360.com" target="_blank">中国国家地理</a> |
                <a href="https://www.nmg.com.cn" target="_blank">内蒙古自然地理/a> |
                <a href="https://www.cgnpc.org.cn" target="_blank">中国地理学会</a>
            </p>
        </div>
    </footer>

    <script src="/geography-site/js/data.js"></script>
    <script src="/geography-site/js/app.js"></script>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
